name: xournalpp
description: A port of the main features of Xournal++ to various Flutter platforms like Android, iOS and the Web.

publish_to: none

version: 1.1.11+27

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  file_picker_cross: ^4.5.0
  intl: ^0.19.0
  archive: ^3.6.1
  xml: ^6.5.0
  url_launcher: ^6.3.0
  transparent_image: ^2.0.0
  receive_sharing_intent: ^1.4.5
  after_layout: ^1.2.0
  shared_preferences: ^2.3.3
  vector_math: ^2.1.1
  flutter_colorpicker: ^1.1.0
  package_info_plus: ^1.4.2

  flutter_localizations:
    sdk: flutter
  font_awesome_flutter: ^10.8.0
  flutter_math_fork: ^0.7.4
  pdfx: ^2.9.2
  pdf: ^3.11.3

dev_dependencies:
  flutter_test:
    sdk:
      flutter
  flutter_launcher_icons: ^0.14.3
  intl_utils: ^2.8.7

flutter_icons:
   android: true
   ios: true
   image_path: "assets/xournalpp.png"
   image_path_ios: "assets/xournalpp-solid.png"
   image_path_android: "assets/xournalpp-adaptive.png"
   adaptive_icon_background: "#673ab7"
   adaptive_icon_foreground: "assets/xournalpp-android.png"

dependency_overrides:
  # Vendored with Android cloud-file (null path) fix.
  # See vendor/file_picker_cross/lib/src/file_picker_mobile.dart
  file_picker_cross:
    path: vendor/file_picker_cross
  # Vendored and updated for AGP 8 / Kotlin 1.9 compatibility.
  disk_space:
    path: vendor/disk_space
  # Pin to the API version used by the app (getMediaStream, SharedMediaFile(path, ...)).
  receive_sharing_intent:
    path: vendor/receive_sharing_intent
  # 10.9.1 uses Color.withValues()/Color.a which are absent from this Flutter build.
  font_awesome_flutter: 10.7.0
  # 6.1.2 is missing the exclusive parameter required by Dart 3's File interface.
  file: 7.0.0
  # 1.4.2 pulls in package_info_plus_windows 1.0.5 with invalid nullable FFI fields.
  package_info_plus_windows:
    path: vendor/package_info_plus_windows
  # 0.7.4 uses RenderObjectWithLayoutCallbackMixin/runLayoutCallback removed in Flutter 3.41.
  flutter_math_fork:
    path: vendor/flutter_math_fork

flutter:
  uses-material-design: true
  assets:
    - assets/
  fonts:
    - family: Open Sans
      fonts:
        - asset: fonts/Open Sans/OpenSans-Regular.ttf
        - asset: fonts/Open Sans/OpenSans-Light.ttf
          weight: 300
        - asset: fonts/Open Sans/OpenSans-ExtraBold.ttf
          weight: 800
    - family: Glacial Indifference
      fonts:
        - asset: fonts/Glacial Indifference/GlacialIndifference-Regular.otf

flutter_intl:
  enabled: true
