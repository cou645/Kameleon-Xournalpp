allprojects {
    repositories {
        google()
        mavenCentral()
    }
    buildscript {
        configurations.classpath {
            resolutionStrategy {
                // Several transitive plugins still ship with ancient Kotlin Gradle
                // plugin versions (e.g. 1.3.72, 1.4.31) which AGP 8 rejects. Force
                // the project Kotlin version everywhere.
                force "org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22"
            }
        }
    }
}

rootProject.buildDir = '../build'
subprojects {
    project.buildDir = "${rootProject.buildDir}/${project.name}"
}
subprojects {
    project.evaluationDependsOn(':app')
}

tasks.register("clean", Delete) {
    delete rootProject.buildDir
}
